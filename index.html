<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CALCULADORA</title>
</head>

<body>
  <h1 class="karina">Karina Almeida</h1>
    <div class="fundo">
       

        <div class="calculadora">
            <h1>Calculadora</h1>
            <p></p>

            <table>
                <tr>
                    <td class="botao"><button onclick="clearDisplay()">C</button></td>
                    <td class="botao"><button onclick="backspace()"><</button></td>
                    <td class="botao"><button onclick="insert('/')">÷</button></td>
                    <td class="botao"><button onclick="insert('*')">x</button></td>
                </tr>

                <tr>
                    <td class="botao"><button onclick="insert('7')">7</button></td>
                    <td class="botao"><button onclick="insert('8')">8</button></td>
                    <td class="botao"><button onclick="insert('9')">9</button></td>
                    <td class="botao"><button onclick="insert('-')">-</button></td>
                </tr>

                <tr>
                    <td class="botao"><button onclick="insert('4')">4</button></td>
                    <td class="botao"><button onclick="insert('5')">5</button></td>
                    <td class="botao"><button onclick="insert('6')">6</button></td>
                    <td class="botao"><button onclick="insert('+')">+</button></td>
                </tr>

                <tr>
                    <td class="botao"><button onclick="insert('1')">1</button></td>
                    <td class="botao"><button onclick="insert('2')">2</button></td>
                    <td class="botao"><button onclick="insert('3')">3</button></td>
                    <td class="botao" rowspan="2"><button onclick="calculate()">=</button></td>
                </tr>

                <tr>

                    <td class="botao" colspan="2"><button onclick="insert('0')">0</button></td>
                    <td class="botao"><button onclick="insert('.')">.</button></td>
                </tr>

            </table>

        </div>




    </div>



</body>
<script src="script.js"></script>

</html>
